<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio Digital</title>
    <style>
        /* Estilização Geral */
        body {
            background-color: #000000; /* Fundo Preto */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Container Principal */
        .main-container {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        /* Estilo do Relógio */
        #clock {
            font-size: 100px;
            font-weight: bold;
            letter-spacing: 5px;
            margin-bottom: 30px;
            font-variant-numeric: tabular-nums; /* Evita que os números "pulem" */
        }

        /* Container do Spotify */
        .spotify-wrapper {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div id="clock">00:00:00</div>

        <div class="spotify-wrapper">
            <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1E4uMbyRXvdu70?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // Formatação com zero à esquerda
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            // Atualiza o texto da div clock
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }

        // Atualiza a cada 1 segundo (1000ms)
        setInterval(updateClock, 1000);

        // Executa imediatamente ao abrir a página
        updateClock();
    </script>

</body>
</html>
