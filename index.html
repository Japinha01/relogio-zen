<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Relógio Zen v1.9</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            padding: 20px;
            overflow: hidden;
        }
        .clock-container { text-align: center; margin-bottom: 30px; user-select: none; }
        #time { font-size: 26vw; font-weight: 200; letter-spacing: -2px; line-height: 1; color: #fff; }
        #date { font-size: 5.5vw; font-weight: 400; color: rgba(255, 255, 255, 0.4); text-transform: lowercase; margin-top: 10px; }
        .spotify-wrapper {
            width: 100%;
            max-width: 450px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        iframe { display: block; border: none; width: 100%; }
        .footer { position: absolute; bottom: 20px; font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="clock-container">
        <div id="time">00:00</div>
        <div id="date">carregando...</div>
    </div>

    <div class="spotify-wrapper">
        <iframe 
            style="border-radius:12px" 
            src="https://open.spotify.com/embed/playlist/37i9dQZF1DWZqdXnZ98Uvx?utm_source=generator" 
            width="100%" 
            height="352" 
            frameBorder="0" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy">
        </iframe>
    </div>

    <div class="footer">ZEN CLOCK v1.9</div>

    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').textContent = `${h}:${m}`;
            const options = { weekday: 'long', day: 'numeric', month: 'short' };
            document.getElementById('date').textContent = now.toLocaleDateString('pt-BR', options);
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
