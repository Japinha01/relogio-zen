<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Relógio Zen v2.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            overflow: hidden;
        }
        .clock-container { text-align: center; margin-bottom: 30px; }
        #time { font-size: 20vw; font-weight: 200; line-height: 1; }
        #date { font-size: 4vw; color: rgba(255, 255, 255, 0.4); margin-top: 10px; text-transform: lowercase; }
        .spotify-wrapper {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            overflow: hidden;
            background: #121212;
        }
        iframe { border: none; }
    </style>
</head>
<body>
    <div class="clock-container">
        <div id="time">00:00</div>
        <div id="date">carregando...</div>
    </div>
    <div class="spotify-wrapper">
        <iframe 
            src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8Ueb9C7V6r9?utm_source=generator" 
            width="100%" 
            height="352" 
            frameBorder="0" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy">
        </iframe>
    </div>
    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').textContent = `${h}:${m}`;
            const options = { weekday: 'long', day: 'numeric', month: 'short' };
            document.getElementById('date').textContent = now.toLocaleDateString('pt-BR', options);
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
