<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Relógio Zen v2.2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .clock-container {
            text-align: center;
            margin-bottom: 20px;
            user-select: none;
        }

        #time {
            font-size: 24vw;
            font-weight: 200;
            line-height: 1;
            letter-spacing: -2px;
        }

        #date {
            font-size: 4.5vw;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 5px;
            text-transform: lowercase;
        }

        /* Container do Player ajustado para o seu link */
        .spotify-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .footer {
            position: absolute;
            bottom: 15px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.1);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div id="time">00:00</div>
        <div id="date">carregando...</div>
    </div>

    <div class="spotify-wrapper">
        <iframe 
            data-testid="embed-iframe" 
            style="border-radius:12px" 
            src="https://open.spotify.com/playlist/2ExuRqJ4s02WgJ2LhOIqjV?si=djGKIYG2RMG2ZFwhBPuK2Q&pi=ec_wF8EiSFqg-5" 
            width="60%" 
            height="352" 
            frameBorder="0" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy">
        </iframe>
    </div>

    <div class="footer">ZEN CLOCK v2.2</div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // Horas e Minutos
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').textContent = `${h}:${m}`;
            
            // Data formatada (segunda-feira, 2 de mar.)
            const options = { weekday: 'long', day: 'numeric', month: 'short' };
            let dateString = now.toLocaleDateString('pt-BR', options);
            document.getElementById('date').textContent = dateString;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
